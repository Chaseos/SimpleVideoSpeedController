<!DOCTYPE html>
<html>
<head>
  <meta charset='UTF-8' />
  <style>
    body {
      width: 250px;
      padding: 16px 16px 8px 16px;
      background: #1a1a1a;
      margin: 0;
    }
    
    .speed-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }
    
    .speed-button {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #4285f4;
      color: white;
      font-size: 16px;
      cursor: pointer;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }
    
    .speed-button:hover {
      transform: translateY(-1px);
    }
    
    .speed-button.selected {
      background: #ff9800;
    }
    
    #customSpeed {
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #444;
      background: #333;
      color: white;
      font-size: 16px;
      height: 44px;
      box-sizing: border-box;
      width: 100%;
      transition: all 0.2s ease;
    }
    
    #setCustomSpeed {
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #34a853;
      color: white;
      cursor: pointer;
      height: 44px;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    #setCustomSpeed:hover {
      transform: translateY(-1px);
    }

    .arrow-controls {
      display: grid;
      grid-template-rows: 1fr 1fr;
      gap: 4px;
      height: 44px;
    }

    .arrow-button {
      padding: 0;
      border: none;
      border-radius: 8px;
      background: #34a853;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui;
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .arrow-button:hover {
      transform: translateY(-1px);
    }

    /* Shortcuts Section */
    .shortcuts-container {
      margin-top: 4px;
    }

    .shortcuts-toggle {
      width: auto;
      margin-left: auto;
      background: none;
      border: none;
      color: #444;
      font-size: 10px;
      padding: 2px 0;
      cursor: pointer;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 3px;
      transition: color 0.2s ease;
    }

    .shortcuts-toggle:hover {
      color: #ccc;
    }

    .shortcuts-toggle .chevron {
      font-size: 9px;
      transition: transform 0.2s ease;
    }

    .shortcuts-toggle.open .chevron {
      transform: rotate(180deg);
    }

    .shortcuts-content {
      display: none;
      padding-top: 4px;
    }

    .shortcuts-content.open {
      display: block;
    }

    .shortcut-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      font-size: 12px;
      color: #bbb;
    }

    .shortcut-row.nested {
      padding-left: 18px;
      position: relative;
    }

    .shortcut-row.nested::before {
      content: '↳';
      position: absolute;
      left: 4px;
      color: #777;
    }

    .shortcut-row.nested .up-arrow {
      color: #777;
      font-size: 14px;
      margin-right: 4px;
      display: inline-flex;
      align-items: center;
      transform: scaleX(-1);
    }

    .shortcut-row:last-child {
      margin-bottom: 0;
    }

    .keys {
      display: flex;
      gap: 3px;
      align-items: center;
    }

    kbd {
      background-color: #2a2a2a;
      border: 1px solid #444;
      border-radius: 3px;
      box-shadow: 0 1px 0 #111;
      color: #ccc;
      display: inline-block;
      font-family: inherit;
      font-size: 11px;
      padding: 2px 5px;
      line-height: 1.2;
      text-align: center;
    }

    /* Force all action keys (the right-most keys) to perfectly align */
    kbd.action-key {
      min-width: 29px;
      box-sizing: border-box;
      display: inline-block;
    }

    /* Pin suggestion overlay */
    .pin-suggestion {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
      color: white;
      animation: fadeIn 0.3s ease-out;
    }

    .pin-suggestion.show {
      display: flex;
    }

    .pin-suggestion p {
      margin: 0 0 16px 0;
      font-size: 14px;
      line-height: 1.4;
    }

    .pin-icon {
      font-size: 30px;
      margin-bottom: 12px;
      font-family: Lucida Unicode;
    }

    .got-it-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: #4285f4;
      color: white;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .got-it-btn:hover {
      transform: translateY(-1px);
      background: #5295ff;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Review Prompt */
    #reviewPrompt {
      margin-top: 4px;
      padding: 10px;
      background: transparent;
      border-radius: 8px;
      display: none; /* Hidden by default */
      align-items: center;
      justify-content: center;
      border: 1px dashed #333;
      cursor: pointer;
      animation: fadeIn 0.3s ease-out;
      transition: all 0.2s ease;
    }

    #reviewPrompt:hover {
      border-color: #444;
      background: rgba(255, 255, 255, 0.02);
    }

    .review-text {
      margin: 0;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      transition: color 0.2s ease;
    }

    #reviewPrompt:hover .review-text {
      color: rgba(255, 255, 255, 0.8);
    }

    .review-link {
      font-weight: bold;
    }

    .star {
      color: #ffd700;
      opacity: 0.5;
      transition: opacity 0.2s ease;
      margin-left: 2px;
    }

    #reviewPrompt:hover .star {
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="speed-row">
    <button class="speed-button" data-speed="0.5">0.5x</button>
    <button class="speed-button" data-speed="1">1x</button>
    <button class="speed-button" data-speed="1.5">1.5x</button>
  </div>
  <div class="speed-row">
    <button class="speed-button" data-speed="2">2x</button>
    <button class="speed-button" data-speed="2.5">2.5x</button>
    <button class="speed-button" data-speed="3">3x</button>
  </div>
  <div class="speed-row">
    <input type="number" id="customSpeed" data-i18n-placeholder="speedPlaceholder" placeholder="Speed" step="0.1" min="0.1" max="16" value="1.00">
    <button id="setCustomSpeed" data-i18n="setButton">Set</button>
    <div class="arrow-controls">
      <button class="arrow-button" id="speedUp">+</button>
      <button class="arrow-button" id="speedDown">-</button>
    </div>
  </div>

  <!-- Shortcuts Section -->
  <div class="shortcuts-container">
    <button class="shortcuts-toggle" id="shortcutsToggle">
      <span data-i18n="shortcutsTitle">Shortcuts</span>
      <span class="chevron" id="shortcutsChevron">▼</span>
    </button>
    <div class="shortcuts-content" id="shortcutsContent">
      <div class="shortcut-row">
        <span data-i18n="shortcutSpeedTune">±0.05x Speed</span>
        <div class="keys">
          <kbd class="meta-key">Cmd</kbd> + <kbd class="alt-key">Opt</kbd> + <kbd class="action-key">+/-</kbd>
        </div>
      </div>
      <div class="shortcut-row">
        <span data-i18n="shortcutReset">Reset to 1x</span>
        <div class="keys">
          <kbd class="meta-key">Cmd</kbd> + <kbd class="alt-key">Opt</kbd> + <kbd class="action-key">⌫</kbd>
        </div>
      </div>
      <div class="shortcut-row">
        <span data-i18n="shortcutToggleMax">Toggle Max Speed</span>
        <div class="keys">
          <kbd class="meta-key">Cmd</kbd> + <kbd class="alt-key">Opt</kbd> + <kbd class="action-key">0</kbd>
        </div>
      </div>
      <div class="shortcut-row">
        <span data-i18n="shortcutSetSpeed">Set to <kbd>1-9</kbd>x Speed</span>
        <div class="keys">
          <kbd class="meta-key">Cmd</kbd> + <kbd class="alt-key">Opt</kbd> + <kbd class="action-key">1-9</kbd>
        </div>
      </div>
      <div class="shortcut-row nested">
        <span data-i18n="shortcutAddExtra">Add +0.5x</span>
        <div class="keys">
          <span class="up-arrow">⤴</span>
          <kbd class="action-key">(x2)</kbd>
        </div>
      </div>
    </div>
  </div>

  <!-- Pin suggestion overlay -->
  <div class="pin-suggestion">
    <div class="pin-icon">↻ & 📌</div>
    <p data-i18n="pinSuggestionText">Reload your tabs and pin this extension for easy access!</p>
    <button class="got-it-btn" data-i18n="gotItBtn">Got it!</button>
  </div>

  <!-- Review prompt -->
  <div id="reviewPrompt">
    <p class="review-text">
      <span class="star">★</span>
      <span data-i18n="reviewPromptText">Find it useful? Leave a review</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 12px; height: 12px; opacity: 0.6; vertical-align: -2px; margin-left: 4px;">
        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
        <polyline points="15 3 21 3 21 9"></polyline>
        <line x1="10" y1="14" x2="21" y2="3"></line>
      </svg>
    </p>
    <a href="#" id="reviewLink" style="display:none" target="_blank"></a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
